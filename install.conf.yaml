# default settings for linking
- defaults:
    link:
      create: true
      force: true
      relink: true

# start by cleaning existing configurations
- clean:
    - '~'
    - '~/.config'
    - '~/.cursor'

# update git submodules
- shell:
    - [git submodule update --init --recursive, Installing submodules]

# load third-party dotbot plugins after submodules are available
- plugins:
    - dotbot-brew

# link configuration files
- link:
    # terminal
    ~/.hushlogin: login/.hushlogin

    # fish shell
    ~/.config/fish/conf.d: fish/config
    ~/.config/fish/functions: fish/functions
    ~/.config/starship.toml: fish/starship.toml

    # ssh
    ~/.ssh/config: ssh/config

    # git
    ~/.gitconfig: git/gitconfig
    ~/.gitconfig-system-specific: git/gitconfig-system-specific

    # gpg
    ~/.gnupg/gpg.conf: gpg/gpg.conf
    ~/.gnupg/gpg-agent.conf: gpg/gpg-agent.conf

    # vim
    ~/.config/nvim: vim

    # cursor
    '~/Library/Application Support/Cursor/User/settings.json': cursor/settings.json
    '~/Library/Application Support/Cursor/User/keybindings.json': cursor/keybindings.json
    ~/.cursor/skills: ai/skills
    ~/.cursor/commands: ai/commands
    ~/.cursor/agents: ai/agents

    # ranger
    ~/.config/ranger: ranger

# set up the home directory structure
- create:
    - ~/Projects

# install brew (automatic install does not work)
- shell:
    - command: scripts/install/brew.sh
      description: Install brew
      stdout: true

# install brew packages from the checked-in Brewfile
- brewfile:
    - brew/Brewfile

# install vim-plug itself
- shell:
    - command: scripts/install/vim-plug.sh
      description: Install vim-plug
      stdout: true

# install vim plugins for terminal nvim and Cursor Neovim
- shell:
    - command: nvim --headless "+PlugInstall --sync" +qa
      description: Install vim plugins
      stdout: true

# install fish shell
- shell:
    - command: scripts/install/fish.sh
      description: Install fish shell
      stdout: true
